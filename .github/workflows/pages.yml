name: Deploy site to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage public files
        run: |
          mkdir -p _site/outputs _site/exports _site/assets
          cp site/*.html site/*.css site/*.js _site/
          cp -r outputs/* _site/outputs/ 2>/dev/null || true
          cp -r exports/* _site/exports/ 2>/dev/null || true
          cp -r assets/* _site/assets/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deployment
        uses: actions/deploy-pages@v4
